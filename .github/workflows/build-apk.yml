name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Cordova
      run: npm install -g cordova@13

    - name: Add Android platform
      run: cordova platform add android

    - name: Build Debug APK
      run: cordova build android --debug

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: whisky-tavern-debug-apk
        path: platforms/android/app/build/outputs/apk/debug/*.apk
        retention-days: 30

    - name: Build Release APK
      run: cordova build android --release
      continue-on-error: true

    - name: Upload Release APK
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: whisky-tavern-release-apk
        path: platforms/android/app/build/outputs/apk/release/*.apk
        retention-days: 30
