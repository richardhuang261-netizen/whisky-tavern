@media (max-width:768px) {

    body { font-size:14px; line-height:1.6; }

    /* 内容区 */
    .content { padding:16px; }
    
    /* 卡片网格：手机上单列 */

    /* 地图 */

/* ===== 小屏手机 (max-width: 480px) ===== */
@media (max-width:480px) {

/* ====== 状态 ====== */
var currentView = 'map';
var currentCigarStrength = '全部';
var currentRegion = '全部';
var currentPrice = '全部';
var currentPeat = '全部';
var currentSearch = '';
var mapInstance = null;

/* ====== 工具函数 ====== */
function parsePrice(priceStr) {
    if (!priceStr) return 0;
    if (priceStr.indexOf('+') !== -1) {
        return parseInt(priceStr) || 99999;
    }
    if (priceStr.indexOf('-') !== -1) {
        var parts = priceStr.split('-');
        var a = parseInt(parts[0]) || 0;
        var b = parseInt(parts[1]) || a;
        return (a + b) / 2;
    }
    return parseInt(priceStr) || 0;
}

function getFilteredWhiskies() {
    return whiskyDatabase.filter(function(w) {
        var matchRegion = currentRegion === '全部' || w.region === currentRegion;
        
        var matchPrice = true;
        var avgPrice = parsePrice(w.price);
        if (currentPrice === '200以下') matchPrice = avgPrice < 200;
        else if (currentPrice === '200-500') matchPrice = avgPrice >= 200 && avgPrice <= 500;
        else if (currentPrice === '500以上') matchPrice = avgPrice > 500;
        
        var matchPeat = true;
        if (currentPeat === '无') matchPeat = w.peat === 0;
        else if (currentPeat === '轻') matchPeat = w.peat >= 1 && w.peat <= 3;
        else if (currentPeat === '中') matchPeat = w.peat >= 4 && w.peat <= 6;
        else if (currentPeat === '重') matchPeat = w.peat >= 7;
        
        var searchLower = currentSearch.toLowerCase();
        var matchSearch = !currentSearch || 
            w.name.indexOf(currentSearch) !== -1 ||
            w.nameEn.toLowerCase().indexOf(searchLower) !== -1 ||
            w.flavor.indexOf(currentSearch) !== -1 ||
            w.region.indexOf(currentSearch) !== -1;
            
        return matchRegion && matchPrice && matchPeat && matchSearch;
    });
}

/* ====== 视图切换 ====== */
function switchView(view) {
    currentView = view;
    var tabs = document.querySelectorAll('.nav-tab');
    for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove('active');
    var views = document.querySelectorAll('.view');
    for (var i = 0; i < views.length; i++) views[i].classList.remove('active');
    
    if (view === 'map') {
        tabs[0].classList.add('active');
        document.getElementById('mapView').classList.add('active');
        document.getElementById('searchBar').style.display = 'block';
        if (mapInstance) mapInstance.invalidateSize();
    } else if (view === 'list') {
        tabs[1].classList.add('active');
        document.getElementById('listView').classList.add('active');
        document.getElementById('searchBar').style.display = 'block';
        renderList();
    renderCigarGrid();
    } else if (view === 'favorites') {
        tabs[2].classList.add('active');
        document.getElementById('collectionView').classList.add('active');
        document.getElementById('searchBar').style.display = 'none';
        renderFavorites();
    }
}

/* ====== 渲染列表 ====== */
function renderList() {
    var grid = document.getElementById('whiskyGrid');
    var filtered = getFilteredWhiskies();
    grid.innerHTML = '';
    
    if (filtered.length === 0) {
        grid.innerHTML = '<div style="color:#d4c5a0;padding:40px;text-align:center;grid-column:1/-1;">没有找到匹配的威士忌</div>';
        return;
    }
    
    for (var i = 0; i < filtered.length; i++) {
        var w = filtered[i];
        var card = document.createElement('div');
        card.className = 'whisky-card';
        card.innerHTML = '<div class="whisky-card-header">' +
                '<div class="whisky-card-name">' + w.name + '</div>' +
                '<div class="whisky-card-name-en">' + w.nameEn + '</div>' +
            '</div>' +
            '<div class="whisky-card-body">' +
                '<div class="whisky-card-meta">' +
                    '<span class="meta-tag">' + w.region + '</span>' +
                    '<span class="meta-tag">' + w.abv + '% ABV</span>' +
                    '<span class="meta-tag">' + (w.age ? w.age + '年' : '无年份') + '</span>' +
                    '<span class="meta-tag">泥煤:' + w.peat + '/10</span>' +
                '</div>' +
                '<div class="whisky-card-flavor">' + w.flavor + '</div>' +
                '<div class="whisky-card-price">¥' + w.price + '</div>' +
                '<div class="whisky-card-actions">' +
                    '<button class="action-btn fav-btn" onclick="event.stopPropagation();toggleFavorite(' + w.id + ')">❤️ 收藏</button>' +
                    '<button class="action-btn note-btn" onclick="event.stopPropagation();showDetail(' + w.id + ')">查看详情</button>' +
                '</div>' +
            '</div>';
        card.onclick = (function(id) { return function() { showDetail(id); }; })(w.id);
        grid.appendChild(card);
    }
}

/* ====== 收藏功能 ====== */
function getFavorites() {
    return JSON.parse(localStorage.getItem('favorites') || '[]');
}

function toggleFavorite(id) {
    var favs = getFavorites();
    var idx = favs.indexOf(id);
    if (idx >= 0) favs.splice(idx, 1);
    else favs.push(id);
    localStorage.setItem('favorites', JSON.stringify(favs));
    if (currentView === 'favorites') renderFavorites();
    else if (currentView === 'list') renderList();
}

function renderFavorites() {
    var grid = document.getElementById('collectionGrid');
    var favs = getFavorites();
    var favWhiskies = whiskyDatabase.filter(function(w) { return favs.indexOf(w.id) >= 0; });
    grid.innerHTML = '';
    
    if (favWhiskies.length === 0) {
        grid.innerHTML = '<div style="color:#d4c5a0;padding:40px;text-align:center;grid-column:1/-1;">还没有收藏任何威士忌</div>';
        return;
    }
    
    for (var i = 0; i < favWhiskies.length; i++) {
        var w = favWhiskies[i];
        var card = document.createElement('div');
        card.className = 'whisky-card';
        card.innerHTML = '<div class="whisky-card-header">' +
                '<div class="whisky-card-name">' + w.name + '</div>' +
                '<div class="whisky-card-name-en">' + w.nameEn + '</div>' +

            '<div class="whisky-card-body">' +
                '<div class="whisky-card-meta">' +
                    '<span class="meta-tag">' + w.region + '</span>' +

                '</div>' +
            '</div>';
        card.onclick = (function(id) { return function() { showDetail(id); }; })(w.id);
        grid.appendChild(card);
    }
}

                '<div style="margin-bottom:30px;">' +
                    '<h3 style="font-size:16px;color:#c9a84c;margin-bottom:12px;letter-spacing:0.08em;">风味特征</h3>' +
                    '<p style="color:rgba(212,197,160,0.7);line-height:1.8;">' + w.flavor + '</p>' +
                '</div>' +
                '<div style="display:flex;gap:14px;margin-bottom:30px;">' +
                    '<button class="action-btn fav-btn ' + (isFav ? 'active' : '') + '" onclick="toggleFavorite(' + w.id + ');showDetail(' + w.id + ')">' + (isFav ? '❤️ 已收藏' : '🤍 收藏') + '</button>' +
                    '<button class="action-btn note-btn" onclick="addNote(' + w.id + ')">📝 添加笔记</button>' +
                '</div>' +
                '<div>' +
                    '<h3 style="font-size:16px;color:#c9a84c;margin-bottom:12px;letter-spacing:0.08em;">品鉴笔记 (' + notes.length + ')</h3>';
    
    if (notes.length === 0) {
        html += '<p style="color:rgba(212,197,160,0.4);">还没有品鉴笔记，点击添加</p>';
    } else {
        for (var j = 0; j < notes.length; j++) {
            html += '<div style="padding:16px 20px;background:rgba(13,13,13,0.5);border:1px solid rgba(201,168,76,0.06);margin-bottom:10px;">' +
                        '<div style="font-size:12px;color:rgba(212,197,160,0.4);margin-bottom:6px;">' + new Date(notes[j].date).toLocaleDateString('zh-CN') + '</div>' +
                        '<div style="color:rgba(212,197,160,0.7);line-height:1.6;">' + notes[j].note + '</div>' +
                        '<button style="margin-top:8px;background:transparent;border:1px solid rgba(231,76,60,0.3);color:rgba(231,76,60,0.7);padding:4px 10px;cursor:pointer;font-size:11px;" onclick="deleteNote(' + w.id + ',' + j + ')">删除</button>' +
                    '</div>';
        }
    }
    
    html += '</div></div></div>';
    document.getElementById('detailView').innerHTML = html;
}

function goBack() {
    if (currentView === 'favorites') switchView('favorites');
    else switchView('list');
}

/* ====== 品鉴笔记 ====== */
function addNote(id) {
    var note = prompt('请输入品鉴笔记：');
    if (!note) return;
    var notes = JSON.parse(localStorage.getItem('notes_' + id) || '[]');
    notes.push({ date: new Date().toISOString(), note: note });
    localStorage.setItem('notes_' + id, JSON.stringify(notes));
    showDetail(id);
}

function deleteNote(id, idx) {
    if (!confirm('确定删除这条笔记？')) return;
    var notes = JSON.parse(localStorage.getItem('notes_' + id) || '[]');
    notes.splice(idx, 1);
    localStorage.setItem('notes_' + id, JSON.stringify(notes));
    showDetail(id);
}

/* ====== 搜索和筛选 ====== */
function searchWhisky() {
    currentSearch = document.querySelector('.search-input').value.trim();
    if (currentView === 'list') renderList();
    if (currentView === 'map') updateMapMarkers();
}

function filterByRegion(e, r) {
    currentRegion = r;
    var btns = document.querySelectorAll('.filter-group')[0].querySelectorAll('.filter-btn');
    for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
    e.target.classList.add('active');
    if (currentView === 'list') renderList();
    if (currentView === 'map') updateMapMarkers();
}

function filterByPrice(e, p) {
    currentPrice = p;
    var btns = document.querySelectorAll('.filter-group')[1].querySelectorAll('.filter-btn');
    for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
    e.target.classList.add('active');
    if (currentView === 'list') renderList();
    if (currentView === 'map') updateMapMarkers();
}

function filterByPeat(e, p) {
    currentPeat = p;
    var btns = document.querySelectorAll('.filter-group')[2].querySelectorAll('.filter-btn');
    for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
    e.target.classList.add('active');
    if (currentView === 'list') renderList();
    if (currentView === 'map') updateMapMarkers();
}


/* ====== 地图标记数组（用于清除）====== */
var mapMarkers = [];

/* ====== 更新地图标记（根据筛选条件）====== */
function updateMapMarkers() {
    if (!mapInstance) return;
    // 清除所有现有标记
    mapMarkers.forEach(function(m) { mapInstance.removeLayer(m); });
    mapMarkers = [];
    // 获取筛选后的威士忌
    var filtered = getFilteredWhiskies ? getFilteredWhiskies() : whiskyDatabase;
    // 按产区分组
    var grouped = {};
    for (var i = 0; i < filtered.length; i++) {
        var r = filtered[i].region;
        if (!grouped[r]) grouped[r] = [];
        grouped[r].push(filtered[i]);
    }
    // 重新添加标记（只添加有匹配酒款的产区）
    var regions = {
        '艾雷岛': { lat:55.75, lon:-6.2, color:'#8b4513' },
        '斯佩塞': { lat:57.48, lon:-3.12, color:'#c41e3a' },
        '高地': { lat:56.8, lon:-4.5, color:'#4169e1' },
        '低地': { lat:55.8, lon:-3.8, color:'#228b22' },
        '坎贝尔镇': { lat:55.43, lon:-5.6, color:'#ff8c00' },
        '岛屿': { lat:57.3, lon:-6.2, color:'#9400d3' },
        '日本': { lat:35.0, lon:137.0, color:'#ff69b4' }
    };
    Object.keys(regions).forEach(function(r) {
        var info = regions[r];
        var whiskies = grouped[r] || [];
        if (whiskies.length === 0) return; // 没有匹配酒款，不添加标记
        var marker = L.marker([info.lat, info.lon]);
        var html = '<div style="font-family:Georgia;background:#1a1a2e;color:#d4c5a0;padding:12px;min-width:200px;"><h3 style="color:' + info.color + ';margin-bottom:8px;">' + r + ' (' + whiskies.length + '款)</h3>';
        var showCount = Math.min(whiskies.length, 8);
        for (var i = 0; i < showCount; i++) {
            html += '<div style="padding:4px 0;cursor:pointer;" onclick="showDetailFromMap(' + whiskies[i].id + ')">' + whiskies[i].name + ' <span style="color:#c9a84c;">¥' + whiskies[i].price + '</span></div>';
        }
        if (whiskies.length > 8) html += '<div style="padding:4px 0;opacity:0.5;">...还有 ' + (whiskies.length - 8) + ' 款</div>';
        html += '</div>';
        marker.bindPopup(html);
        marker.addTo(mapInstance);
        mapMarkers.push(marker);
    });
}

/* ====== 地图初始化 ====== */
function initMap() {
    if (mapInstance) return;
    mapInstance = L.map('map').setView([57.0, -4.0], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(mapInstance);
    
    var regions = {
        '艾雷岛': { lat:55.75, lon:-6.2, color:'#8b4513' },
        '斯佩塞': { lat:57.48, lon:-3.12, color:'#c41e3a' },
        '高地': { lat:56.8, lon:-4.5, color:'#4169e1' },
        '低地': { lat:55.8, lon:-3.8, color:'#228b22' },
        '坎贝尔镇': { lat:55.43, lon:-5.6, color:'#ff8c00' },
        '岛屿': { lat:57.3, lon:-6.2, color:'#9400d3' },
        '日本': { lat:35.0, lon:137.0, color:'#ff69b4' }
    };
    
    updateMapMarkers();
}

function showDetailFromMap(id) {
    switchView('list');
    setTimeout(function() { showDetail(id); }, 100);
}

document.addEventListener('DOMContentLoaded', function() {
